version: '3.8'

services:
  aryasoft-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aryasoft-website
    restart: unless-stopped
    ports:
      - "7777:80"
    environment:
      - TZ=Europe/Istanbul
    labels:
      - "com.aryasoft.description=Aryasoft Corporate Website"
      - "com.aryasoft.version=1.0.0"
    networks:
      - aryasoft-network
    # Sağlık kontrolü
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  aryasoft-network:
    driver: bridge
    name: aryasoft-network
